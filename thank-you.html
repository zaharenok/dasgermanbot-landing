  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #070612;
      --bg-alt: #0c0d20;
      --text: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.6);
      --text-muted: rgba(255, 255, 255, 0.35);
      --accent: #4271FE;
      --accent-hover: #5a85FF;
      --accent-light: rgba(66, 113, 254, 0.15);
      --border: rgba(255, 255, 255, 0.08);
      --radius: 12px;
      --radius-lg: 24px;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
    }

    .thank-card {
      text-align: center;
      background: rgba(12, 13, 32, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 60px 48px;
      max-width: 500px;
      width: 100%;
      box-shadow: var(--shadow);
      z-index: 10;
    }

    .thank-icon {
      width: 80px;
      height: 80px;
      background: rgba(66, 113, 254, 0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin: 0 auto 32px;
      color: var(--accent);
    }

    .checkmark {
      width: 40px;
      height: 40px;
      stroke: var(--accent);
      stroke-width: 3;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .thank-card h1 {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
      color: #ffffff;
    }

    .thank-card p {
      font-size: 17px;
      color: var(--text-secondary);
      margin-bottom: 40px;
      line-height: 1.65;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 32px;
      background: var(--accent);
      color: #ffffff;
      border: none;
      border-radius: 100px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s ease;
      width: 100%;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(66, 113, 254, 0.3);
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 24px;
      padding: 12px 24px;
      background: transparent;
      color: rgba(255, 255, 255, 0.35);
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .btn-back:hover {
      color: var(--accent);
    }

    /* Lang switcher in top-right corner */
    .lang-switcher {
      position: fixed;
      top: 24px;
      right: 24px;
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 4px;
      gap: 2px;
    }

    .lang-btn {
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.5);
      background: transparent;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .lang-btn.active {
      background: rgba(255, 255, 255, 0.15);
      color: #ffffff;
    }

    .lang-btn:hover:not(.active) {
      color: rgba(255, 255, 255, 0.8);
    }

    /* ── Cookie Banner ── */
    .cookie-banner {
      position: fixed; bottom: 24px; left: 24px; right: 24px; max-width: 680px; margin: 0 auto;
      display: none; align-items: center; gap: 20px;
      background: rgba(12, 13, 32, 0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border); border-radius: 16px;
      padding: 20px 28px; box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
      z-index: 9999; font-size: 14px; color: var(--text-secondary); line-height: 1.5;
    }
    .cookie-banner.visible { display: flex; animation: slideUp 0.4s ease; }
    @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .cookie-banner a { color: var(--accent); font-weight: 600; text-decoration: underline; }
    .cookie-banner__buttons { display: flex; gap: 8px; flex-shrink: 0; }
    .cookie-banner__btn {
      padding: 10px 20px; border-radius: 100px; font-size: 13px; font-weight: 700;
      cursor: pointer; border: none; transition: all 0.2s ease; white-space: nowrap;
    }
    .cookie-banner__btn--accept { background: var(--accent); color: #fff; }
    .cookie-banner__btn--accept:hover { background: var(--accent-hover); }
    .cookie-banner__btn--decline { background: rgba(255, 255, 255, 0.08); color: var(--text-secondary); }
    .cookie-banner__btn--decline:hover { background: rgba(255, 255, 255, 0.15); }
    @media (max-width: 768px) {
      .cookie-banner { flex-direction: column; text-align: center; gap: 12px; }
      .cookie-banner__buttons { width: 100%; }
      .cookie-banner__btn { flex: 1; }
    }
    #confetti-canvas { position:fixed;top:0;left:0;width:100%;height:100%;z-index:9998;pointer-events:none; }
  </style>

<body>

  <div class="lang-switcher">

    <button class="lang-btn" data-lang="uk">UA</button>

  <div class="thank-card">
    <div class="thank-icon">
      <svg class="checkmark" viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h1 data-i18n="thank_title">You're In!</h1>
    <p data-i18n="thank_subtitle">Check your Telegram — the bot is ready to start your first lesson.</p>
    <p style="font-size:14px;color:var(--text-muted);margin-top:-24px;margin-bottom:32px;"><span data-i18n="thank_redirect">Opening Telegram in</span> <strong id="redirect-counter">3</strong>s</p>
    <a href="https://t.me/DasGermanbot?start=payment_success" class="btn-primary">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 00-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41-1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31-1.08-.66.02-.18.27-.36.74-.55 2.92-1.27 4.86-2.11 5.83-2.51 2.78-1.16 3.35-1.36 3.73-1.36.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.24 0 .38z"/></svg>
      <span data-i18n="thank_cta">Open Telegram</span>
    </a>
    <a href="index.html" class="btn-back">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      <span data-i18n="thank_back">Back to Home</span>
    </a>
  </div>

  <script>
    const translations = {
      en: {
        thank_title: "You're In!",
        thank_subtitle: "Check your Telegram — the bot is ready to start your first lesson.",
        thank_redirect: "Opening Telegram in",
        thank_cta: "Open Telegram",
        thank_back: "Back to Home",
        cookie_text: 'We use cookies for analytics and advertising. <a href="privacy.html">Learn more</a>',
        cookie_accept: "Accept",
        cookie_decline: "Decline"
      },
      uk: {
        thank_title: "Ти в справі!",
        thank_subtitle: "Заглянь у Telegram — бот уже чекає на тебе на перший урок.",
        thank_redirect: "Відкриваємо Telegram через",
        thank_cta: "Відкрити Telegram",
        thank_back: "На головну",
        cookie_text: 'Ми використовуємо кукі для аналітики та реклами. <a href="privacy.html">Детальніше</a>',
        cookie_accept: "Прийняти",
        cookie_decline: "Відхилити"
      },
      ru: {
        thank_title: "Ты в деле!",
        thank_subtitle: "Загляни в Telegram — бот уже ждёт тебя на первый урок.",
        thank_redirect: "Открываем Telegram через",
        thank_cta: "Открыть Telegram",
        thank_back: "На главную",
        cookie_text: 'Мы используем куки для аналитики и рекламы. <a href="privacy.html">Подробнее</a>',
        cookie_accept: "Принять",
        cookie_decline: "Отклонить"
      },
      sk: {
        thank_title: "Vitaj!",
        thank_subtitle: "Pozri si svoj Telegram — bot je pripravený na tvoju prvú lekciu.",
        thank_redirect: "Otvárame Telegram za",
        thank_cta: "Otvoriť Telegram",
        thank_back: "Späť na domovskú stránku",
        cookie_text: 'Používame cookies na analytiku a reklamu. <a href="privacy.html">Viac info</a>',
        cookie_accept: "Prijať",
        cookie_decline: "Odmietnuť"
      }
    };

    // ── Auto-detect language from browser ──
    function detectLanguage() {
      const supported = ['en', 'uk', 'ru', 'sk'];
      const browserLangs = navigator.languages || [navigator.language || navigator.userLanguage || 'en'];
      for (const bl of browserLangs) {
        const code = bl.toLowerCase().substring(0, 2);
        if (supported.includes(code)) return code;
      }
      return 'en';
    }

    let currentLang = localStorage.getItem('lang') || detectLanguage();

    function setLanguage(lang) {
      currentLang = lang;
      localStorage.setItem('lang', lang);
      document.documentElement.lang = lang;

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[lang] && translations[lang][key]) {
          if (key === 'cookie_text') {
            el.innerHTML = translations[lang][key];
          } else {
            el.textContent = translations[lang][key];
          }
        }
      });

      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
    }

    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
    });

    setLanguage(currentLang);

    // ── Auto-redirect to Telegram after 3s ──
    (function() {
      var seconds = 3;
      var counter = document.getElementById('redirect-counter');
      if (counter) counter.textContent = seconds;
      var timer = setInterval(function() {
        seconds--;
        if (counter) counter.textContent = seconds;
        if (seconds <= 0) {
          clearInterval(timer);
          window.location.href = 'https://t.me/DasGermanbot?start=payment_success';
        }
      }, 1000);
    })();

    // ── Confetti ──
    (function(){
      var c=document.getElementById('confetti-canvas'),ctx=c.getContext('2d');
      function resize(){c.width=window.innerWidth;c.height=window.innerHeight}
      resize(); window.addEventListener('resize',resize);
      var colors=['#4271FE','#FA6254','#2ECC71','#FFD700','#FF69B4','#00D4FF','#FF6B35'];
      var particles=[];
      for(var i=0;i<150;i++){
        particles.push({
          x:c.width/2+(Math.random()-0.5)*200,
          y:c.height*0.45,
          vx:(Math.random()-0.5)*14,
          vy:Math.random()*-18-4,
          w:Math.random()*8+4,
          h:Math.random()*6+3,
          color:colors[Math.floor(Math.random()*colors.length)],
          rot:Math.random()*360,
          rv:(Math.random()-0.5)*12,
          g:0.25+Math.random()*0.15,
          o:1
        });
      }
      function draw(){
        ctx.clearRect(0,0,c.width,c.height);
        var alive=false;
        for(var i=0;i<particles.length;i++){
          var p=particles[i];
          p.x+=p.vx; p.vy+=p.g; p.y+=p.vy; p.rot+=p.rv; p.vx*=0.99;
          if(p.y>c.height+20) p.o-=0.05;
          if(p.o<=0) continue;
          alive=true;
          ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
          ctx.globalAlpha=p.o; ctx.fillStyle=p.color;
          ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
          ctx.restore();
        }
        if(alive) requestAnimationFrame(draw);
        else ctx.clearRect(0,0,c.width,c.height);
      }
      draw();
    })();

    // ── Cookie Banner ──
    document.addEventListener('DOMContentLoaded', function() {
      if (localStorage.getItem('cookie_consent')) return;
      var banner = document.getElementById('cookie-banner');
      if (banner) banner.classList.add('visible');
      document.getElementById('cookie-accept')?.addEventListener('click', function() {
        localStorage.setItem('cookie_consent', 'accepted');
        banner.classList.remove('visible');
      });
      document.getElementById('cookie-decline')?.addEventListener('click', function() {
        localStorage.setItem('cookie_consent', 'declined');
        banner.classList.remove('visible');
      });
    });
  </script>

  <div id="cookie-banner" class="cookie-banner">
    <span data-i18n="cookie_text">We use cookies for analytics and advertising. <a href="privacy.html">Learn more</a></span>
    <div class="cookie-banner__buttons">
      <button class="cookie-banner__btn cookie-banner__btn--decline" id="cookie-decline" data-i18n="cookie_decline">Decline</button>
      <button class="cookie-banner__btn cookie-banner__btn--accept" id="cookie-accept" data-i18n="cookie_accept">Accept</button>
    </div>
  </div>
</body>
