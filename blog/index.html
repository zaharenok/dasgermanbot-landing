  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #070612;
      --bg-alt: #0c0d20;
      --bg-card: rgba(255, 255, 255, 0.04);
      --bg-card-hover: rgba(255, 255, 255, 0.07);
      --text: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.6);
      --text-muted: rgba(255, 255, 255, 0.35);
      --accent: #4271FE;
      --accent-hover: #5a85FF;
      --accent-light: rgba(66, 113, 254, 0.15);
      --accent-coral: #FA6254;
      --border: rgba(255, 255, 255, 0.08);
      --radius: 12px;
      --radius-lg: 24px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      background-color: var(--bg);
    }

    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; border: none; font-family: inherit; }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ── Navbar ── */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(7, 6, 18, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .navbar .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 72px;
    }

    .navbar__logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      font-size: 20px;
      color: #ffffff;
      letter-spacing: -0.02em;
    }

    .navbar__logo-icon { font-size: 24px; line-height: 1; }

    .navbar__actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .navbar__nav {
      display: flex;
      gap: 32px;
    }

    .navbar__nav a {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-secondary);
      transition: color 0.2s ease;
    }

    .navbar__nav a:hover,
    .navbar__nav a.active {
      color: #ffffff;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: var(--accent);
      color: #ffffff;
      border-radius: 100px;
      font-size: 15px;
      font-weight: 700;
      transition: all 0.2s ease;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(66, 113, 254, 0.4);
      background: var(--accent-hover);
    }

    .lang-dropdown {
      display: inline-flex;
      position: relative;
    }
    .lang-dropdown__toggle {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 14px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 100px;
      font-size: 13px;
      font-weight: 700;
      color: #ffffff;
      cursor: pointer;
      border: none;
    }
    .lang-dropdown__toggle::after {
      content: '\25BE';
      font-size: 10px;
      margin-left: 2px;
    }
    .lang-dropdown__menu {
      display: none;
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 6px;
      background: rgba(12, 13, 32, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      padding: 6px;
      z-index: 200;
      min-width: 120px;
    }
    .lang-dropdown__menu.open { display: block; }
    .lang-dropdown__menu button {
      display: block;
      width: 100%;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.5);
      background: transparent;
      text-align: left;
      cursor: pointer;
      border: none;
      font-family: inherit;
    }
    .lang-dropdown__menu button.active,
    .lang-dropdown__menu button:hover {
      background: rgba(255, 255, 255, 0.15);
      color: #ffffff;
    }

    .lang-btn:hover:not(.active) {
      color: rgba(255, 255, 255, 0.8);
    }

    /* ── Hero ── */
    .blog-hero {
      padding: 160px 0 80px;
      text-align: center;
    }

    .blog-hero h1 {
      font-size: clamp(36px, 5vw, 64px);
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 16px;
    }

    .blog-hero p {
      font-size: 18px;
      color: var(--text-secondary);
      max-width: 520px;
      margin: 0 auto;
    }

    /* ── Article Grid ── */
    .articles {
      padding: 0 0 120px;
    }

    .articles__grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
    }

    .article-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px 32px;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .article-card:hover {
      transform: translateY(-4px);
      background: var(--bg-card-hover);
      border-color: rgba(255, 255, 255, 0.12);
    }

    .article-card__date {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .article-card__title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
      line-height: 1.3;
      color: #ffffff;
    }

    .article-card__desc {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.6;
      flex: 1;
      margin-bottom: 20px;
    }

    .article-card__bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .article-card__tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .article-card__tag {
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 100px;
      background: var(--accent-light);
      color: var(--accent);
    }

    .article-card__langs {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .article-card__lang-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      font-size: 9px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.4);
    }

    .article-card__lang-dot--current {
      background: var(--accent-light);
      color: var(--accent);
    }

    .articles__empty {
      text-align: center;
      padding: 80px 0;
      color: var(--text-muted);
      font-size: 16px;
    }

    .articles__loader {
      text-align: center;
      padding: 40px 0;
    }

    .loader-spinner {
      width: 32px;
      height: 32px;
      margin: 0 auto;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Footer ── */
    .footer {
      padding: 60px 0;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }

    .footer .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer__left {
      font-size: 15px;
      color: var(--text-secondary);
    }

    .footer__links {
      display: flex;
      gap: 32px;
    }

    .footer__links a {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-secondary);
      transition: color 0.2s ease;
    }

    .footer__links a:hover { color: var(--accent); }

    /* ── Responsive ── */
    @media (max-width: 992px) {
      .blog-hero h1 { font-size: clamp(32px, 5vw, 48px); }
      .articles__grid { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }

    .lang-dropdown__menu button.active,

      .btn-primary {

    @media (max-width: 480px) {

      }

  </style>

  <script>
    // ── i18n ──
    const translations = {
      en: {
        logo: "Das German Bot",
        nav_home: "Home",
        nav_blog: "Blog",
        nav_cta: "Open in Telegram",
        blog_title: "Blog",
        blog_subtitle: "Tips, guides, and insights on learning German with AI.",
        blog_empty: "No articles yet. Check back soon!",
        read_more: "Read more"
      },
      uk: {
        logo: "Das German Bot",
        nav_home: "Головна",
        nav_blog: "Блог",
        nav_cta: "Відкрити в Telegram",
        blog_title: "Блог",
        blog_subtitle: "Поради, гайди та інсайти про вивчення німецької з ШІ.",
        blog_empty: "Статей ще немає. Загляньте пізніше!",
        read_more: "Читати далі"
      },
      ru: {
        logo: "Das German Bot",
        nav_home: "Главная",
        nav_blog: "Блог",
        nav_cta: "Открыть в Telegram",
        blog_title: "Блог",
        blog_subtitle: "Советы, гайды и инсайты об изучении немецкого с ИИ.",
        blog_empty: "Статей пока нет. Загляните позже!",
        read_more: "Читать далее"
      },
      sk: {
        logo: "Das German Bot",
        nav_home: "Domov",
        nav_blog: "Blog",
        nav_cta: "Otvoriť v Telegram",
        blog_title: "Blog",
        blog_subtitle: "Tipy, návody a postrehy o učení nemčiny s AI.",
        blog_empty: "Zatiaľ žiadne články. Vráťte sa neskôr!",
        read_more: "Čítať viac"
      }
    };

    function detectLanguage() {
      const supported = ['en', 'uk', 'ru', 'sk'];
      const browserLangs = navigator.languages || [navigator.language || navigator.userLanguage || 'en'];
      for (const bl of browserLangs) {
        const code = bl.toLowerCase().substring(0, 2);
        if (supported.includes(code)) return code;
      }
      return 'en';
    }

    let currentLang = localStorage.getItem('lang') || detectLanguage();
    const ARTICLES_PER_PAGE = 10;
    let allArticles = [];
    let displayedCount = 0;
    let scrollObserver = null;

    function setLanguage(lang) {
      currentLang = lang;
      localStorage.setItem('lang', lang);
      document.documentElement.lang = lang;

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[lang] && translations[lang][key]) {
          el.textContent = translations[lang][key];
        }
      });

      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });

      loadManifest(lang);
    }

    // Language dropdown
    var dropdownToggle = document.getElementById('lang-dropdown-toggle');
    var dropdownMenu = document.getElementById('lang-dropdown-menu');
    var dropdownLabel = document.getElementById('lang-dropdown-label');
    var langLabels = { en: 'EN', uk: 'UA', ru: 'RU', sk: 'SK' };
    if (dropdownToggle) {
      dropdownToggle.addEventListener('click', function(e) {
        e.stopPropagation();
        dropdownMenu.classList.toggle('open');
      });
      document.addEventListener('click', function() { dropdownMenu.classList.remove('open'); });
    }
    document.querySelectorAll('.lang-dropdown__menu button').forEach(function(btn) {
      btn.addEventListener('click', function() { setLanguage(btn.dataset.lang); });
    });
    });

    // ── Render articles ──
    function formatDate(dateStr, lang) {
      const date = new Date(dateStr);
      const locales = { en: 'en-US', uk: 'uk-UA', ru: 'ru-RU', sk: 'sk-SK' };
      return date.toLocaleDateString(locales[lang] || 'en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function renderLangDots(langs, currentLang) {
      const allLangs = ['en', 'uk', 'ru', 'sk'];
      const labels = { en: 'EN', uk: 'UA', ru: 'RU', sk: 'SK' };
      return '<div class="article-card__langs">' +
        allLangs.filter(l => langs[l]).map(l =>
          '<div class="article-card__lang-dot' + (l === currentLang ? ' article-card__lang-dot--current' : '') + '">' + labels[l] + '</div>'
        ).join('') + '</div>';
    }

    function renderCard(article, lang) {
      const t = article.langs[lang] || article.langs['en'] || Object.values(article.langs)[0];
      return `<a href="${article.slug}.html" class="article-card">
        <div class="article-card__date">${formatDate(article.date, lang)}</div>
        <div class="article-card__title">${t.title}</div>
        <div class="article-card__desc">${t.description}</div>
        <div class="article-card__bottom">
          ${article.tags && article.tags.length ? `<div class="article-card__tags">${article.tags.map(t => `<span class="article-card__tag">${t}</span>`).join('')}</div>` : '<div></div>'}
          ${renderLangDots(article.langs, lang)}
        </div>
      </a>`;
    }

    async function loadManifest(lang) {
      const grid = document.getElementById('articles-grid');
      const empty = document.getElementById('articles-empty');
      const loader = document.getElementById('articles-loader');

      if (scrollObserver) { scrollObserver.disconnect(); scrollObserver = null; }
      grid.innerHTML = '';
      empty.style.display = 'none';
      loader.style.display = 'none';

      try {
        const res = await fetch('manifest.json');
        allArticles = await res.json();
        allArticles = allArticles.map(a => { a.langs = a.langs || a.languages; return a; });
        // Reverse so newest article (last in manifest.json) appears first
        allArticles = allArticles.filter(a => a.langs[lang] || Object.keys(a.langs).length > 0).reverse();
        allArticles = allArticles.filter(a => a.langs[lang] || Object.keys(a.langs).length > 0);
        displayedCount = 0;

        if (allArticles.length === 0) { empty.style.display = 'block'; return; }

        renderNextPage(lang);

        if (displayedCount < allArticles.length) {
          scrollObserver = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && displayedCount < allArticles.length) {
              renderNextPage(currentLang);
            }
          }, { rootMargin: '200px' });
          scrollObserver.observe(loader);
        }
      } catch (e) {
        empty.style.display = 'block';
      }
    }

    function renderNextPage(lang) {
      const grid = document.getElementById('articles-grid');
      const loader = document.getElementById('articles-loader');
      const batch = allArticles.slice(displayedCount, displayedCount + ARTICLES_PER_PAGE);

      grid.insertAdjacentHTML('beforeend', batch.map(a => renderCard(a, lang)).join(''));
      displayedCount += batch.length;

      if (displayedCount < allArticles.length) {
        loader.style.display = '';
      } else {
        loader.style.display = 'none';
        if (scrollObserver) { scrollObserver.disconnect(); scrollObserver = null; }
      }
    }

    // ── Init ──
    document.getElementById('year').textContent = new Date().getFullYear();
    setLanguage(currentLang);
  </script>
</body>
</html>
